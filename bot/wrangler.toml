name = "lasagna-bot"
main = "src/index.ts"
compatibility_date = "2026-01-01"

compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
WEB_APP_URL = ""
BOT_TOKEN = ""

# Secrets (set via CLI, not stored here):
# wrangler secret put BOT_TOKEN
