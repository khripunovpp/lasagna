@defer {
  <lg-fade-in>
    <lg-container>
      <lg-title (click)="onTitleTap()">{{ 'settings.title'|translate }}</lg-title>

      <lg-tabs name="settings">
        <ng-template alias="language" label="{{ 'language.settings-title'|translate }}" lgTab>
          <lg-language-settings></lg-language-settings>
        </ng-template>

        <ng-template alias="categoires" label="{{ 'categories.settings-title'|translate }}" lgTab>
          <lg-tabs [flat]="true"
                   [scrollable]="false"
                   [silent]="true"
                   name="categories-settings">
            <ng-template [label]="'categories.products.link-label' | translate" alias="system" lgTab>
              <lg-flex-column>
                <lg-category-add-form titleKey="categories.add-product"
                                      type="product"></lg-category-add-form>
                <lg-category-list titleKey="categories.products.title"
                                  type="product"></lg-category-list>
              </lg-flex-column>
            </ng-template>

            <ng-template [label]="'categories.recipes.link-label' | translate" alias="system" lgTab>
              <lg-flex-column>
                <lg-category-add-form titleKey="categories.add-recipe"
                                      type="recipe"></lg-category-add-form>
                <lg-category-list titleKey="categories.recipes.title"
                                  type="recipe"></lg-category-list>
              </lg-flex-column>
            </ng-template>
          </lg-tabs>
        </ng-template>

        @if (hasInvoicesFeature) {
          <ng-template [label]="'settings.invoice.title' | translate" alias="invoice" lgTab>
            <lg-invoices-settings></lg-invoices-settings>
          </ng-template>

          <ng-template [label]="'settings.credentials.title' | translate" alias="credentials" lgTab>
            <lg-credentials-settings></lg-credentials-settings>
          </ng-template>

          <ng-template [label]="'settings.taxes.title' | translate" alias="taxes" lgTab>
            <lg-taxes-settings></lg-taxes-settings>
          </ng-template>
        }

        <ng-template alias="data" label="{{ 'data.settings-title'|translate }}" lgTab>
          <lg-tabs [flat]="true"
                   [scrollable]="false"
                   [silent]="true">
            <ng-template alias="backup" label="{{ 'backup.settings-title'|translate }}" lgTab>
              <lg-backup-settings></lg-backup-settings>
            </ng-template>

            <ng-template [label]="'settings.drafts.title' | translate" alias="drafts" lgTab>
              <lg-drafts-settings></lg-drafts-settings>
            </ng-template>

            @if (canSync()) {
              <ng-template alias="sync" label="{{ 'sync.title'|translate }}" lgTab>
                <lg-sync-settings></lg-sync-settings>
              </ng-template>
            }

            @if (hasSyncFeature) {
              <ng-template alias="deleted" label="{{ 'deleted-data.settings-title'|translate }}" lgTab>
                <lg-deleted-data-storage-view></lg-deleted-data-storage-view>
              </ng-template>
            }
          </lg-tabs>
        </ng-template>

        <ng-template alias="logs" label="{{ 'log-center.title'|translate }}" lgTab>
          <lg-log-center-page></lg-log-center-page>
        </ng-template>

        @if (hasAuthFeature) {
          <ng-template alias="account" label="{{ 'account.title'|translate }}" lgTab>
            <lg-account-settings></lg-account-settings>
          </ng-template>
        }
      </lg-tabs>
    </lg-container>
  </lg-fade-in>
} @error {
  {{ 'settings.defer-load-error' | translate }}
}
