version: '3.9'

# Supabase запускается отдельно: supabase start / supabase stop
# Worker и Bot читают секреты из .dev.vars (скопируй из .dev.vars.example)

services:
  angular-dev:
    build:
      context: ./lasagna
      dockerfile: Dockerfile.dev
    container_name: angular-dev
    ports:
      - "4200:4200"
    volumes:
      - ./lasagna:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm run start-docker"
    networks:
      - lasagna-net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    container_name: worker-dev
    ports:
      - "3333:3333"
    volumes:
      - ./worker:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lasagna-net

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.dev
    container_name: bot-dev
    ports:
      - "8787:8787"
    volumes:
      - ./bot:/app
      - /app/node_modules
    networks:
      - lasagna-net

networks:
  lasagna-net:
    driver: bridge
